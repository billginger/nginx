server {
    listen       80;
    server_name  localhost;

    location / {
        include  /etc/nginx/ip.conf;
        include  /etc/nginx/cookie.conf;
        proxy_pass  https://www.baidu.com;
    }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}
